# CodeRabbit configuration file
# https://docs.coderabbit.ai/

language: en-GB
early_access: true

reviews:
  profile: chill
  collapse_walkthrough: false
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - cr-skip
      - ai-skip
    drafts: false
    base_branches:
      - v3-candidate
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    simplify:
      enabled: false

chat:
  auto_reply: true
  integrations:
    jira:
      usage: disabled
    linear:
      usage: disabled

knowledge_base:
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
  jira:
    usage: disabled
  linear:
    usage: disabled

code_generation:
  docstrings:
    language: en-GB